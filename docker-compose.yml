version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: endurolab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enduro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-endurodev}
      POSTGRES_DB: ${POSTGRES_DB:-endurolab}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enduro}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
